name: Add issues to Project

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  add:
    if: ${{ github.event_name == 'issues' }}
    runs-on: ubuntu-latest
    steps:
      - name: Ensure PROJECT_ID is configured
        env:
          PROJECT_ID: ${{ vars.LEGO_PROJECT_ID }}
        run: |
          if [ -z "${PROJECT_ID:-}" ]; then
            echo "LEGO_PROJECT_ID repository variable is not set."
            echo "Set it under Settings → Secrets and variables → Variables → LEGO_PROJECT_ID (ProjectV2 node id)."
            exit 1
          fi
      - name: Add to project
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_ID: ${{ vars.LEGO_PROJECT_ID }}
          CONTENT_ID: ${{ github.event.issue.node_id }}
        run: |
          cat > body.json <<'JSON'
          {
            "query": "mutation($project:ID!, $content:ID!){ addProjectV2ItemById(input:{projectId:$project, contentId:$content}){ item { id }}}",
            "variables": { "project": "'"$PROJECT_ID"'", "content": "'"$CONTENT_ID"'" }
          }
          JSON
          curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            --data @body.json | jq .
