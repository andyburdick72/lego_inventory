[pytest]
testpaths = tests
# Note: Coverage settings are now in pyproject.toml for consistency
# Use --cov-config=pyproject.toml to ensure pyproject.toml settings are used
addopts = -q --disable-warnings --cov=src --cov-config=pyproject.toml --cov-report=term-missing --cov-report=xml --cov-report=html
markers =
    contract: tests that hit the running HTTP API (FastAPI on port 8001)
    smoke: fast sanity checks for critical flows
    coverage: coverage enforcement gates
    ui: UI tests (deprecated - Next.js renders client-side)