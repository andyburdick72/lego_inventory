[pytest]
testpaths = tests
addopts = -q --disable-warnings --cov=src --cov-report=term-missing:skip-covered --cov-report=xml --cov-report=html --cov-fail-under=70
markers =
    contract: tests that hit the running HTTP API (FastAPI on port 8001)
    smoke: fast sanity checks for critical flows
    coverage: coverage enforcement gates
    ui: UI tests (deprecated - Next.js renders client-side)